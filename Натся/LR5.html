<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица значений функции</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        label {
            font-size: 18px;
            display: block;
            margin-bottom: 10px;
        }
        select {
            padding: 10px;
            font-size: 16px;
            width: 220px;
            border: 2px solid #ddd;
            border-radius: 5px;
            background-color: white;
        }
        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .description {
            margin: 20px 0;
            padding: 15px;
            background-color: #e8f4fc;
            border-left: 5px solid #3498db;
            font-size: 16px;
        }
        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        #result {
            display: none; /* Скрыто до нажатия кнопки */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Таблица значений функции</h1>
        
        <div class="description">
            <strong>Что будет выведено:</strong><br>
            Таблица значений функции <strong>f(x) = x² + 3x − 5</strong> для всех целых x от 1 до выбранного числа n.
        </div>

        <form id="calcForm">
            <label for="n">Выберите число n:</label>
            <select id="n" required>
                <option value="" disabled selected>— выберите значение —</option>
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="25">25</option>
                <option value="30">30</option>
                <option value="40">40</option>
                <option value="50">50</option>
            </select>
            <br><br>
            <button type="submit">Показать таблицу</button>
        </form>

        <div id="result">
            <h2>Результат (n = <span id="chosenN"></span>):</h2>
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>x</th>
                        <th>f(x) = x² + 3x − 5</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Заполняется JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('calcForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const n = parseInt(document.getElementById('n').value);

            // Функция для вычисления
            function f(x) {
                return x * x + 3 * x - 5;
            }

            // Очищаем таблицу
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = '';

            // Заполняем строки
            for (let x = 1; x <= n; x++) {
                const row = document.createElement('tr');
                
                const cellX = document.createElement('td');
                cellX.textContent = x;
                
                const cellFX = document.createElement('td');
                cellFX.textContent = f(x);
                
                row.appendChild(cellX);
                row.appendChild(cellFX);
                tbody.appendChild(row);
            }

            // Показываем результат и указываем выбранное n
            document.getElementById('chosenN').textContent = n;
            document.getElementById('result').style.display = 'block';
        });
    </script>
</body>
</html>
